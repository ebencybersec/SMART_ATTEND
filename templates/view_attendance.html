<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>View Attendance • ATU</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script defer src="{{ url_for('static', filename='js/main.js') }}"></script>
</head>
<body>
  <div class="header">
    <img src="{{ url_for('static', filename='img/atu_logo.png') }}" alt="ATU">
    <h1>View Attendance</h1>
  </div>

  <div class="container">
    <div class="card">
      <div class="grid" style="grid-template-columns: 2fr 2fr auto;">
        <select id="course">
          <option value="">-- select course --</option>
          {% for c in courses %}
            <option value="{{ c }}">{{ c }}</option>
          {% endfor %}
        </select>
        <input type="date" id="dateFilter">
        <button class="btn" onclick="viewCourseRecords()">Load</button>
      </div>

      <table id="recordsTable" style="margin-top:16px;">
        <thead><tr><th>Student ID</th><th>Name</th><th>Course</th><th>Status</th><th>Timestamp</th></tr></thead>
        <tbody></tbody>
      </table>

      <a class="btn outline" href="{{ url_for('dashboard') }}">⬅ Back</a>
    </div>
  </div>
</body>
</html>
