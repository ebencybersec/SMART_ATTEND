<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Attendance Records • ATU</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="header">
    <img src="{{ url_for('static', filename='img/atu_logo.png') }}" alt="ATU">
    <h1>Attendance Records</h1>
  </div>

  <div class="container">
    <div class="card">
      <h3>Filters</h3>
      <div class="grid" style="grid-template-columns: 2fr 2fr auto;">
        <select id="course"></select>
        <input type="date" id="dateFilter">
        <button class="btn" onclick="loadRecords()">Load</button>
      </div>

      <h3 style="margin-top:16px;">Results</h3>
      <table id="recordsTable">
        <thead><tr><th>Student ID</th><th>Name</th><th>Course</th><th>Status</th><th>Timestamp</th></tr></thead>
        <tbody></tbody>
      </table>

      <a class="btn outline" href="{{ url_for('dashboard') }}">⬅ Back</a>
    </div>
  </div>

  <script>
    async function loadCourses() {
      const sel = document.getElementById("course");
      sel.innerHTML = `<option value="">All courses</option>`;
      const res = await fetch("/api/courses");
      const data = await res.json();
      data.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.name;
        opt.textContent = c.name;
        sel.appendChild(opt);
      });
    }

    async function loadRecords() {
      const course = document.getElementById("course").value;
      const date = document.getElementById("dateFilter").value;
      let url = "/api/records";
      const params = [];
      if (course) params.push("course=" + encodeURIComponent(course));
      if (date) params.push("date=" + date);
      if (params.length) url += "?" + params.join("&");

      const res = await fetch(url);
      const data = await res.json();
      const tbody = document.querySelector("#recordsTable tbody");
      tbody.innerHTML = "";
      data.forEach(r => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${r.student_id}</td>
          <td>${r.student_name || "N/A"}</td>
          <td>${r.course}</td>
          <td>${r.status}</td>
          <td>${r.timestamp}</td>`;
        tbody.appendChild(tr);
      });
    }

    loadCourses().then(loadRecords);
  </script>
</body>
</html>
